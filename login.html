<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodman Café | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
<a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
    <img src="logo.JPEG" alt="Goodman Refreshment Logo" class="nav-logo">
    Goodman Café
</a>    </div>
</nav>

<section class="container py-5">
    <div class="row justify-content-center align-items-center">
        <div class="col-lg-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h1 class="section-title">Welcome Back</h1>
                    <p>Login to continue ordering from Goodman Café.</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="loginName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="loginPassword" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-wine w-100">Login</button>
                </form>

                <div id="loginResult" class="alert alert-success mt-4 d-none"></div>

                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer text-center">
    <p class="mb-0">© 2026 Goodman Café | Login Page</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
