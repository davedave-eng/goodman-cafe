<section class="container py-5">
    <div class="text-center mb-5">
        <span class="badge badge-wine rounded-pill px-3 py-2">Order Form</span>
        <h1 class="section-title mt-3">Place your Goodman Café order</h1>
        <p>Fill out the form below. This is for project demonstration only.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <form id="orderForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Customer Name</label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contactNumber" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Choose Product</label>
                            <select class="form-select" id="product" required>
                                <option value="">Select item</option>
                                <option>Americano</option>
                                <option>Cappuccino</option>
                                <option>Spanish Latte</option>
                                <option>Mango Graham</option>
                                <option>Okinawa Milk Tea</option>
                                <option>Matcha Strawberry</option>
                                <option>Milky Choco</option>
                                <option>Chocolate Cookie</option>
                                <option>Matcha Cookie</option>
                                <option>Red Velvet Cookie</option>
                                <option>Original Chocolate-Chip Cookie</option>
                                <option>Dubai Chewy Cookie</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" min="1" value="1" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Size</label>
                            <select class="form-select" id="size">
                                <option>Regular</option>
                                <option>Large</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Special Request</label>
                            <textarea class="form-control" id="request" rows="3" placeholder="Example: less ice, less sugar, extra pearls"></textarea>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-wine w-100">Submit Order</button>
                        </div>
                    </div>
                </form>

                <div id="orderResult" class="alert alert-success mt-4 d-none"></div>
            </div>
        </div>
    </div>
</section>
