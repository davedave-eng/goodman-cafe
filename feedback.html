    <div class="container">
<a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
    <img src="logo.jpeg" alt="Goodman Refreshment Logo" class="nav-logo">
    Goodman Café
</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

            </ul>
        </div>
    </div>
</nav>

<section class="container py-5">
    <div class="text-center mb-5">
        <span class="badge badge-wine rounded-pill px-3 py-2">Customer Feedback</span>
        <h1 class="section-title mt-3">Tell us what you think</h1>
        <p>Your comments help Goodman Café improve its service.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <form id="feedbackForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="feedbackName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <select id="rating" class="form-select" required>
                            <option value="">Choose rating</option>
                            <option>5 - Excellent</option>
                            <option>4 - Very Good</option>
                            <option>3 - Good</option>
                            <option>2 - Fair</option>
                            <option>1 - Needs Improvement</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Feedback Message</label>
                        <textarea id="message" class="form-control" rows="5" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-wine w-100">Submit Feedback</button>
                </form>

                <div id="feedbackResult" class="alert alert-success mt-4 d-none"></div>
            </div>
        </div>
    </div>
</section>

<footer class="footer text-center">
    <p class="mb-0">© 2026 Goodman Café | Feedback Page</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
